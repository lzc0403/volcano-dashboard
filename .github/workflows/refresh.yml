name: Refresh Dashboard Data

on:
  schedule:
    # 每天 UTC 1:00-13:00 (北京时间 9:00-21:00) 每小时执行
    - cron: '0 1-13 * * *'
  workflow_dispatch: {}  # 支持手动触发

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from Tencent Docs
        env:
          TENCENT_DOCS_TOKEN: ${{ secrets.TENCENT_DOCS_TOKEN }}
        run: node refresh-data.js

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: refresh $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,refresh-data.js,setup-scheduler.ps1,server.js,README.md'
